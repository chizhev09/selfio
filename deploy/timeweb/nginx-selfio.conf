# Example Nginx for Selfio on one Timeweb VPS: HTTPS, SPA from /var/www/selfio/dist, API and admin under /api -> uvicorn :8000.
# Adjust ssl_certificate paths and root to your panel; then: nginx -t && systemctl reload nginx.

server {
    listen 443 ssl http2;
    server_name selfio.ru www.selfio.ru;

    ssl_certificate     /etc/ssl/selfio/fullchain.pem;
    ssl_certificate_key /etc/ssl/selfio/privkey.pem;

    root /var/www/selfio/dist;
    index index.html;

    client_max_body_size 80m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name selfio.ru www.selfio.ru;
    return 301 https://selfio.ru$request_uri;
}
