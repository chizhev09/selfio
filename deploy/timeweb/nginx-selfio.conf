# =============================================================================
# ТОЛЬКО фрагмент виртуального хоста Selfio — файл сайта, не главный nginx.conf.
#
# Куда класть: /etc/nginx/sites-available/selfio
# Активация:    ln -sf /etc/nginx/sites-available/selfio /etc/nginx/sites-enabled/selfio
#
# НЕ вставляйте этот текст в начало /etc/nginx/nginx.conf и не кладите блоки server
# выше директивы http { } — отсюда ошибка «server directive is not allowed here».
#
# Главный конфиг возьмите из nginx-main-http.conf.example (блок http + include sites-enabled).
#
# Selfio: HTTPS, SPA из /var/www/selfio/dist, /api -> uvicorn :8000; www -> редирект на apex.
# SSL-пути и root подставьте свои; затем: nginx -t && systemctl reload nginx.
#
# Кеш: JS/CSS/webp в /assets/, шрифты в /fonts/. Проверка: curl -sI https://selfio.ru/assets/<файл>.js
# =============================================================================

# HTTPS: с www только редирект на основной домен (без отдельного SPA на www).
server {
    listen 443 ssl http2;
    server_name www.selfio.ru;

    ssl_certificate     /etc/ssl/selfio/fullchain.pem;
    ssl_certificate_key /etc/ssl/selfio/privkey.pem;

    return 301 https://selfio.ru$request_uri;
}

# HTTPS: основной сайт только на selfio.ru
server {
    listen 443 ssl http2;
    server_name selfio.ru;

    ssl_certificate     /etc/ssl/selfio/fullchain.pem;
    ssl_certificate_key /etc/ssl/selfio/privkey.pem;

    root /var/www/selfio/dist;
    index index.html;

    client_max_body_size 80m;

    # Сжатие: на мобильном интернете без gzip JS/CSS в 3–4 раза тяжелее.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Оболочка SPA: без долгого кеша — после деплоя пользователь получает новый index и новые имена чанков в /assets/.
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    location /assets/ {
        # Только add_header: директива expires добавила бы второй Cache-Control и перепутала бы браузеры.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Иначе SPA подсовывает index.html на /.git, /.env — в логах ложное «200» для сканеров.
    location ~* /\.(git|env|vite|idea|vscode|DS_Store) {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP: и apex, и www — сразу на канонический https://selfio.ru
server {
    listen 80;
    server_name selfio.ru www.selfio.ru;
    return 301 https://selfio.ru$request_uri;
}
