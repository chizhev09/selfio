# Пример Nginx для Selfio на одном VPS Timeweb: HTTPS, SPA из /var/www/selfio/dist, /api -> uvicorn :8000.
# www отключён как отдельный «сайт»: любой запрос на www уходит 301 на https://selfio.ru (один origin, проще CORS и куки).
# Пути к сертификатам и root подставь из панели; затем: nginx -t && systemctl reload nginx.
# Сертификат для блока www должен покрывать имя www.selfio.ru (обычно один SAN-сертификат на оба имени).

# HTTPS: с www только редирект на основной домен (без отдельного SPA на www).
server {
    listen 443 ssl http2;
    server_name www.selfio.ru;

    ssl_certificate     /etc/ssl/selfio/fullchain.pem;
    ssl_certificate_key /etc/ssl/selfio/privkey.pem;

    return 301 https://selfio.ru$request_uri;
}

# HTTPS: основной сайт только на selfio.ru
server {
    listen 443 ssl http2;
    server_name selfio.ru;

    ssl_certificate     /etc/ssl/selfio/fullchain.pem;
    ssl_certificate_key /etc/ssl/selfio/privkey.pem;

    root /var/www/selfio/dist;
    index index.html;

    client_max_body_size 80m;

    # Сжатие: на мобильном интернете без gzip JS/CSS в 3–4 раза тяжелее.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP: и apex, и www — сразу на канонический https://selfio.ru
server {
    listen 80;
    server_name selfio.ru www.selfio.ru;
    return 301 https://selfio.ru$request_uri;
}
